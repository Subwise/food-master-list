<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Shopping">
<title>Shopping List</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f5f5f0;--bg3:#e8e8e4;
  --tx:#1a1a18;--tx2:#6b6b68;--tx3:#a0a09e;
  --bd:rgba(0,0,0,0.1);--bd2:rgba(0,0,0,0.18);
  --gbg:#EAF3DE;--gtx:#27500A;--gbd:#639922;
  --bbg:#E6F1FB;--btx:#0C447C;--bbd:#378ADD;
  --rbg:#FCEBEB;--rtx:#791F1F;--rbd:#A32D2D;
  --nh:68px;
  --extra-bottom:16px;
  --sb:env(safe-area-inset-bottom,0px);
  --st:env(safe-area-inset-top,0px)
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
  --tx:#f2f2f0;--tx2:#a0a09e;--tx3:#6b6b68;
  --bd:rgba(255,255,255,0.1);--bd2:rgba(255,255,255,0.18);
  --gbg:#173404;--gtx:#C0DD97;--gbd:#3B6D11;
  --bbg:#042C53;--btx:#B5D4F4;--bbd:#185FA5;
  --rbg:#501313;--rtx:#F7C1C1;--rbd:#A32D2D
}}
html,body{height:100%;background:var(--bg2);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:16px;-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;background:var(--bg2)}
.hd{background:var(--bg);border-bottom:0.5px solid var(--bd);padding:14px 16px 12px;padding-top:calc(14px + var(--st));flex-shrink:0}
.hd h1{font-size:20px;font-weight:600;color:var(--tx)}
.hs{font-size:13px;color:var(--tx2);margin-top:2px}
.ct{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 12px calc(var(--extra-bottom) + var(--nh) + var(--sb) + 20px)}
.bn{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:calc(var(--nh) + var(--sb) + var(--extra-bottom));background:var(--bg);border-top:0.5px solid var(--bd);display:flex;align-items:flex-start;padding-top:12px;z-index:100}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:6px 0;color:var(--tx3);font-size:11px;font-family:inherit;-webkit-tap-highlight-color:transparent}
.nb i{font-size:24px}
.nb.ac{color:var(--tx)}
.card{background:var(--bg);border-radius:12px;border:0.5px solid var(--bd);margin-bottom:10px;overflow:hidden}
.ch{display:flex;align-items:center;padding:14px 16px;cursor:pointer;user-select:none;gap:10px;min-height:62px;-webkit-tap-highlight-color:transparent}
.ci{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.cn{font-size:15px;font-weight:500;color:var(--tx)}
.cc{font-size:12px;color:var(--tx3);margin-top:2px}
.cv{font-size:18px;color:var(--tx3);transition:transform .2s;margin-left:auto}
.cv.op{transform:rotate(180deg)}
.il{border-top:0.5px solid var(--bd)}
.ir{display:flex;align-items:center;padding:13px 16px;border-bottom:0.5px solid var(--bd);gap:12px;min-height:52px}
.ir:last-child{border-bottom:none}
.cb{width:30px;height:30px;border-radius:50%;border:2px solid var(--bd2);background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s;-webkit-tap-highlight-color:transparent}
.cb i{font-size:17px;color:transparent}
.cb.on{background:var(--gbg);border-color:var(--gbd)}
.cb.on i{color:var(--gtx)}
.inm{flex:1;font-size:16px;color:var(--tx);line-height:1.3}
.inm.dk{color:var(--tx3);text-decoration:line-through}
.db{width:40px;height:40px;border-radius:50%;border:none;background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx3);font-size:20px;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.ai{display:flex;align-items:center;padding:8px 12px;gap:8px;border-top:0.5px solid var(--bd);background:var(--bg2)}
.ai input{flex:1;height:44px;border:0.5px solid var(--bd2);border-radius:8px;background:var(--bg);color:var(--tx);font-size:15px;padding:0 12px;font-family:inherit;-webkit-appearance:none}
.ai input:focus{outline:none;border-color:var(--bbd)}
.ib{width:44px;height:44px;border-radius:8px;border:0.5px solid var(--bd2);background:var(--bg);color:var(--tx);font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.rc{background:var(--bg);border-radius:12px;border:0.5px solid var(--bd);padding:14px 16px;margin-bottom:10px}
.rt{font-size:16px;font-weight:500;color:var(--tx)}
.ri{font-size:13px;color:var(--tx2);margin-top:4px;line-height:1.5}
.ra{display:flex;gap:8px;margin-top:12px}
.bt{height:44px;border-radius:8px;border:0.5px solid var(--bd2);background:var(--bg2);color:var(--tx);font-size:14px;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;padding:0 14px;white-space:nowrap;-webkit-tap-highlight-color:transparent;flex-shrink:0}
.bt i{font-size:18px}
.bt.pr{background:var(--bbg);color:var(--btx);border-color:var(--bbd);flex:1}
.bt.dr{background:var(--rbg);color:var(--rtx);border-color:var(--rbd)}
.bt:active{transform:scale(0.97)}
.mw{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.mo{background:var(--bg);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:88vh;display:flex;flex-direction:column;padding-bottom:calc(16px + var(--sb))}
.mh{width:36px;height:4px;background:var(--bd2);border-radius:2px;margin:10px auto 0;flex-shrink:0}
.mhd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;flex-shrink:0;border-bottom:0.5px solid var(--bd)}
.mttl{font-size:17px;font-weight:600;color:var(--tx)}
.mb{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.mf{padding:12px 16px 0;display:flex;gap:10px;flex-shrink:0}
.mf .bt{flex:1;height:50px;font-size:15px}
.mi{display:flex;align-items:center;padding:14px 16px;border-bottom:0.5px solid var(--bd);gap:12px;cursor:pointer;min-height:54px;-webkit-tap-highlight-color:transparent}
.mi:last-child{border-bottom:none}
.mc{width:28px;height:28px;border-radius:6px;border:2px solid var(--bd2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;color:transparent}
.mc.on{background:var(--bbg);border-color:var(--bbd);color:var(--btx)}
.ml{flex:1;font-size:16px;color:var(--tx)}
.mrow{display:flex;align-items:center;padding:12px 16px;gap:10px;background:var(--bg);border-bottom:0.5px solid var(--bd);min-height:56px}
.mrow:last-child{border-bottom:none}
.mrow-name{flex:1;font-size:16px;color:var(--tx)}
.sl{font-size:12px;font-weight:500;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;padding:0 4px;margin:16px 0 6px}
.inrow{display:flex;gap:8px;margin-bottom:10px}
.inrow input{flex:1;height:48px;border:0.5px solid var(--bd2);border-radius:8px;background:var(--bg);color:var(--tx);font-size:15px;padding:0 12px;font-family:inherit;-webkit-appearance:none}
.inrow input:focus{outline:none;border-color:var(--bbd)}
.inrow .bt{height:48px;padding:0 18px}
.em{text-align:center;padding:40px 20px;color:var(--tx3);font-size:15px}
.em i{font-size:42px;display:block;margin-bottom:10px}
.arrow-btn{width:36px;height:36px;border-radius:8px;border:0.5px solid var(--bd2);background:var(--bg2);color:var(--tx2);font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.arrow-btn:active{transform:scale(0.92);background:var(--bg3)}
.arrow-btn:disabled{opacity:0.25;pointer-events:none}
.edit-name-row{display:flex;align-items:center;gap:8px;padding:10px 12px;border-top:0.5px solid var(--bd);background:var(--bg2)}
.edit-name-row input{flex:1;height:40px;border:0.5px solid var(--bd2);border-radius:8px;background:var(--bg);color:var(--tx);font-size:15px;padding:0 12px;font-family:inherit;-webkit-appearance:none}
.edit-name-row input:focus{outline:none;border-color:var(--bbd)}
.save-btn{height:40px;padding:0 14px;border-radius:8px;border:0.5px solid var(--bbd);background:var(--bbg);color:var(--btx);font-size:14px;font-family:inherit;cursor:pointer;white-space:nowrap}
</style>
</head>
<body>
<div id="app">
  <div class="hd">
    <h1 id="ptit">Shopping list</h1>
    <div class="hs" id="psub"></div>
  </div>
  <div class="ct" id="ct"></div>
  <nav class="bn">
    <button class="nb ac" id="nav-list" onclick="setTab('list')"><i class="ti ti-shopping-cart"></i>List</button>
    <button class="nb" id="nav-recipes" onclick="setTab('recipes')"><i class="ti ti-soup"></i>Recipes</button>
    <button class="nb" id="nav-manage" onclick="setTab('manage')"><i class="ti ti-settings"></i>Manage</button>
  </nav>
</div>
<div id="mr"></div>
<script>
const IC={
  c1:{i:'ti-leaf',bg:'#EAF3DE',fg:'#27500A'},
  c2:{i:'ti-meat',bg:'#FAECE7',fg:'#712B13'},
  c3:{i:'ti-bottle',bg:'#E6F1FB',fg:'#0C447C'},
  c4:{i:'ti-bread',bg:'#FAEEDA',fg:'#633806'},
  c5:{i:'ti-cup',bg:'#E1F5EE',fg:'#085041'},
  c6:{i:'ti-candy',bg:'#FBEAF0',fg:'#72243E'},
  c7:{i:'ti-box',bg:'#F1EFE8',fg:'#444441'}
};
function cs(id){return IC[id]||{i:'ti-tag',bg:'#F1EFE8',fg:'#444441'}}

const K='slv4';
function df(){
  return{
    categories:[
      {id:'c1',name:'Fruits & Veggies'},
      {id:'c2',name:'Meat & Fish'},
      {id:'c3',name:'Dairy & Eggs'},
      {id:'c4',name:'Bread & Bakery'},
      {id:'c5',name:'Drinks'},
      {id:'c6',name:'Candy & Snacks'},
      {id:'c7',name:'Other'}
    ],
    items:[
      {id:'i1',name:'Apples',catId:'c1',checked:false},
      {id:'i2',name:'Chicken breast',catId:'c2',checked:false},
      {id:'i3',name:'Milk',catId:'c3',checked:false},
      {id:'i4',name:'Pasta',catId:'c7',checked:false},
      {id:'i5',name:'Tomatoes',catId:'c1',checked:false},
      {id:'i6',name:'Cheese',catId:'c3',checked:false}
    ],
    recipes:[
      {id:'r1',name:'Pasta Bolognese',ingredients:['i4','i2','i5']},
      {id:'r2',name:'Caprese Salad',ingredients:['i5','i6']}
    ],
    col:{}
  }
}

let S;
try{S=JSON.parse(localStorage.getItem(K))||df()}catch(e){S=df()}
if(!S.col)S.col={};

function sv(){try{localStorage.setItem(K,JSON.stringify(S))}catch(e){}}
function uid(){return 'x'+Math.random().toString(36).slice(2,9)}

let tab='list';

function setTab(t){
  tab=t;
  ['list','recipes','manage'].forEach(n=>{
    document.getElementById('nav-'+n).classList.toggle('ac',n===t)
  });
  render();
}

function render(){
  const ts={list:'Shopping list',recipes:'Recipes',manage:'Manage'};
  document.getElementById('ptit').textContent=ts[tab];
  if(tab==='list')rl();
  else if(tab==='recipes')rr();
  else rm();
}

// ---- LIST ----
// Show ALL categories, even empty ones
function rl(){
  const{categories:cats,items}=S;
  document.getElementById('psub').textContent=
    items.filter(i=>i.checked).length+' of '+items.length+' checked';
  let h='';
  cats.forEach(cat=>{
    const ci=items.filter(i=>i.catId===cat.id);
    const s=cs(cat.id);
    const dc=ci.filter(i=>i.checked).length;
    const col=S.col[cat.id];
    h+='<div class="card">';
    h+='<div class="ch" onclick="tcat(\''+cat.id+'\')">';
    h+='<div class="ci" style="background:'+s.bg+';color:'+s.fg+'"><i class="ti '+s.i+'"></i></div>';
    h+='<div><div class="cn">'+cat.name+'</div><div class="cc">'+(ci.length?dc+' of '+ci.length+' checked':'Empty')+'</div></div>';
    h+='<i class="ti ti-chevron-down cv '+(col?'':'op')+'"></i>';
    h+='</div>';
    if(!col){
      h+='<div class="il">';
      if(ci.length){
        ci.forEach(item=>{
          h+='<div class="ir">';
          h+='<button class="cb '+(item.checked?'on':'')+'" onclick="ti(\''+item.id+'\')"><i class="ti ti-check"></i></button>';
          h+='<span class="inm '+(item.checked?'dk':'')+'">'+item.name+'</span>';
          h+='<button class="db" onclick="ri(\''+item.id+'\')"><i class="ti ti-x"></i></button>';
          h+='</div>';
        });
      }
      h+='<div class="ai">';
      h+='<input type="text" placeholder="Add to '+cat.name+'..." id="ai-'+cat.id+'" onkeydown="if(event.key===\'Enter\')aic(\''+cat.id+'\')" />';
      h+='<button class="ib" onclick="aic(\''+cat.id+'\')"><i class="ti ti-plus"></i></button>';
      h+='</div>';
      h+='</div>';
    }
    h+='</div>';
  });
  if(!cats.length)h='<div class="em"><i class="ti ti-shopping-cart"></i>No categories yet.<br>Add some in Manage.</div>';
  document.getElementById('ct').innerHTML=h;
}

function tcat(id){S.col[id]=!S.col[id];sv();rl()}
function ti(id){const it=S.items.find(i=>i.id===id);if(it)it.checked=!it.checked;sv();rl()}
function ri(id){S.items=S.items.filter(i=>i.id!==id);sv();rl()}
function aic(cid){
  const el=document.getElementById('ai-'+cid);
  const nm=el.value.trim();
  if(!nm)return;
  S.items.push({id:uid(),name:nm,catId:cid,checked:false});
  el.value='';sv();rl();
}

// ---- RECIPES ----
function rr(){
  const{recipes,items}=S;
  document.getElementById('psub').textContent=
    recipes.length+' recipe'+(recipes.length!==1?'s':'');
  let h='<div class="inrow"><input type="text" id="nr" placeholder="New recipe name..." onkeydown="if(event.key===\'Enter\')ar()"/>';
  h+='<button class="bt pr" onclick="ar()"><i class="ti ti-plus"></i>Add</button></div>';
  if(!recipes.length)h+='<div class="em"><i class="ti ti-soup"></i>No recipes yet</div>';
  recipes.forEach(r=>{
    const ings=r.ingredients.map(id=>items.find(i=>i.id===id)?.name).filter(Boolean);
    h+='<div class="rc">';
    h+='<div class="rt">'+r.name+'</div>';
    h+='<div class="ri">'+(ings.length?ings.join(', '):'No ingredients yet')+'</div>';
    h+='<div class="ra">';
    h+='<button class="bt" onclick="oim(\''+r.id+'\')"><i class="ti ti-pencil"></i>Edit</button>';
    h+='<button class="bt pr" onclick="ocm(\''+r.id+'\')"><i class="ti ti-basket"></i>Add to list</button>';
    h+='<button class="bt dr" onclick="drec(\''+r.id+'\')"><i class="ti ti-trash"></i></button>';
    h+='</div></div>';
  });
  document.getElementById('ct').innerHTML=h;
}

function ar(){
  const el=document.getElementById('nr');
  const nm=el.value.trim();
  if(!nm)return;
  S.recipes.push({id:uid(),name:nm,ingredients:[]});
  el.value='';sv();rr();
}
function drec(id){S.recipes=S.recipes.filter(r=>r.id!==id);sv();rr()}

function oim(rid){
  const r=S.recipes.find(x=>x.id===rid);
  const{items,categories}=S;
  let b='';
  categories.forEach(cat=>{
    const ci=items.filter(i=>i.catId===cat.id);
    if(!ci.length)return;
    b+='<div style="padding:10px 16px 4px;font-size:12px;font-weight:500;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em">'+cat.name+'</div>';
    ci.forEach(item=>{
      const on=r.ingredients.includes(item.id);
      b+='<div class="mi" onclick="tig(\''+rid+'\',\''+item.id+'\')">';
      b+='<div class="mc '+(on?'on':'')+'" id="ic-'+item.id+'">'+(on?'<i class="ti ti-check"></i>':'')+'</div>';
      b+='<span class="ml">'+item.name+'</span>';
      b+='</div>';
    });
  });
  if(!b)b='<div class="em" style="padding:20px"><i class="ti ti-info-circle"></i>Add items to your list first, then assign them to recipes.</div>';
  sm('Ingredients: '+r.name,b,[{l:'Done',c:'pr',fn:'cm()'}]);
}

function tig(rid,iid){
  const r=S.recipes.find(x=>x.id===rid);
  if(!r)return;
  if(r.ingredients.includes(iid))r.ingredients=r.ingredients.filter(i=>i!==iid);
  else r.ingredients.push(iid);
  sv();
  const el=document.getElementById('ic-'+iid);
  if(el){
    const on=r.ingredients.includes(iid);
    el.classList.toggle('on',on);
    el.innerHTML=on?'<i class="ti ti-check"></i>':'';
  }
}

function ocm(rid){
  const r=S.recipes.find(x=>x.id===rid);
  const ings=r.ingredients.map(id=>S.items.find(i=>i.id===id)).filter(Boolean);
  if(!ings.length){alert('Add ingredients to this recipe first.');return}
  let b='<div style="padding:12px 16px 6px;font-size:14px;color:var(--tx2)">Check what you already have — the rest gets added to your list.</div>';
  ings.forEach(item=>{
    b+='<div class="mi" onclick="thv(\''+item.id+'\')">';
    b+='<div class="mc" id="hv-'+item.id+'"></div>';
    b+='<span class="ml">'+item.name+'</span>';
    b+='</div>';
  });
  sm(r.name,b,[{l:'Cancel',c:'',fn:'cm()'},{l:'Add missing to list',c:'pr',fn:"am('"+rid+"')"}]);
}

function thv(id){
  const el=document.getElementById('hv-'+id);
  if(!el)return;
  const on=el.classList.toggle('on');
  el.innerHTML=on?'<i class="ti ti-check"></i>':'';
}

function am(rid){
  const r=S.recipes.find(x=>x.id===rid);
  r.ingredients.forEach(iid=>{
    const el=document.getElementById('hv-'+iid);
    if(!(el&&el.classList.contains('on'))){
      const it=S.items.find(i=>i.id===iid);
      if(it)it.checked=false;
    }
  });
  sv();cm();setTab('list');
}

// ---- MANAGE ----
// Up/down arrows for reorder, inline edit for rename
function rm(){
  document.getElementById('psub').textContent='Reorder & edit categories';
  let h='<div class="sl">Store sections</div><div class="card">';
  const cats=S.categories;
  cats.forEach((cat,idx)=>{
    const s=cs(cat.id);
    const isFirst=idx===0;
    const isLast=idx===cats.length-1;
    h+='<div class="mrow">';
    h+='<div class="ci" style="background:'+s.bg+';color:'+s.fg+';width:30px;height:30px;font-size:15px;border-radius:6px;flex-shrink:0"><i class="ti '+s.i+'"></i></div>';
    h+='<span class="mrow-name">'+cat.name+'</span>';
    // Up arrow
    h+='<button class="arrow-btn" onclick="movecat(\''+cat.id+'\',-1)" '+(isFirst?'disabled':'')+' aria-label="Move up"><i class="ti ti-chevron-up"></i></button>';
    // Down arrow
    h+='<button class="arrow-btn" onclick="movecat(\''+cat.id+'\',1)" '+(isLast?'disabled':'')+' aria-label="Move down"><i class="ti ti-chevron-down"></i></button>';
    // Edit pencil
    h+='<button class="arrow-btn" onclick="editcat(\''+cat.id+'\')" aria-label="Rename"><i class="ti ti-pencil"></i></button>';
    // Delete
    h+='<button class="db" onclick="rcat(\''+cat.id+'\')" aria-label="Remove"><i class="ti ti-x"></i></button>';
    h+='</div>';
    // Inline rename row — shown when editing
    h+='<div class="edit-name-row" id="en-'+cat.id+'" style="display:none">';
    h+='<input type="text" id="ei-'+cat.id+'" value="'+cat.name+'" onkeydown="if(event.key===\'Enter\')savecat(\''+cat.id+'\')" placeholder="Category name..." />';
    h+='<button class="save-btn" onclick="savecat(\''+cat.id+'\')">Save</button>';
    h+='</div>';
  });
  h+='</div>';
  h+='<div class="sl">Add category</div>';
  h+='<div class="inrow"><input type="text" id="nc" placeholder="Category name..." onkeydown="if(event.key===\'Enter\')ac()"/>';
  h+='<button class="bt pr" onclick="ac()"><i class="ti ti-plus"></i>Add</button></div>';
  h+='<div class="sl">Actions</div>';
  h+='<div class="card"><div class="mrow" style="cursor:pointer" onclick="uall()">';
  h+='<i class="ti ti-refresh" style="font-size:22px;color:var(--tx2)"></i>';
  h+='<span style="flex:1;font-size:16px;color:var(--tx)">Uncheck all items</span>';
  h+='<i class="ti ti-chevron-right" style="color:var(--tx3)"></i>';
  h+='</div></div>';
  document.getElementById('ct').innerHTML=h;
}

function movecat(id,dir){
  const cats=S.categories;
  const idx=cats.findIndex(c=>c.id===id);
  const nidx=idx+dir;
  if(nidx<0||nidx>=cats.length)return;
  const[m]=cats.splice(idx,1);
  cats.splice(nidx,0,m);
  sv();rm();
}

function editcat(id){
  // Hide all other open edit rows first
  S.categories.forEach(c=>{
    const el=document.getElementById('en-'+c.id);
    if(el)el.style.display='none';
  });
  const row=document.getElementById('en-'+id);
  if(row){
    row.style.display='flex';
    const inp=document.getElementById('ei-'+id);
    if(inp){inp.focus();inp.select();}
  }
}

function savecat(id){
  const inp=document.getElementById('ei-'+id);
  if(!inp)return;
  const nm=inp.value.trim();
  if(!nm)return;
  const cat=S.categories.find(c=>c.id===id);
  if(cat)cat.name=nm;
  sv();rm();
}

function ac(){
  const el=document.getElementById('nc');
  const nm=el.value.trim();
  if(!nm)return;
  S.categories.push({id:uid(),name:nm});
  el.value='';sv();rm();
}
function rcat(id){
  if(S.items.some(i=>i.catId===id)){
    alert('Remove items in this category first.');return;
  }
  S.categories=S.categories.filter(c=>c.id!==id);
  sv();rm();
}
function uall(){S.items.forEach(i=>i.checked=false);sv();render()}

// ---- MODAL ----
function sm(title,bhtml,btns){
  const bh=btns.map(b=>'<button class="bt '+b.c+'" onclick="'+b.fn+'">'+b.l+'</button>').join('');
  document.getElementById('mr').innerHTML=
    '<div class="mw" onclick="if(event.target===this)cm()">'
    +'<div class="mo">'
    +'<div class="mh"></div>'
    +'<div class="mhd"><span class="mttl">'+title+'</span>'
    +'<button class="db" onclick="cm()"><i class="ti ti-x"></i></button></div>'
    +'<div class="mb">'+bhtml+'</div>'
    +'<div class="mf">'+bh+'</div>'
    +'</div></div>';
}
function cm(){document.getElementById('mr').innerHTML='';if(tab==='recipes')rr()}

render();
</script>
</body>
